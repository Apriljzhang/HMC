<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prince Education</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Prince Education</h1>
            <div class="pill">Secure payments</div>
          </div>
        </div>
      </header>

      <div class="card">
        <h2>AALA 2026 credit card payment</h2>
        <p>
          To pay for AALA 2026 by credit card, please start from the AALA registration page,
          then continue to checkout here.
        </p>
        <div class="actions">
          <a class="btn-secondary" href="checkout.html" style="display:inline-block;text-decoration:none;padding:10px 14px;">
            Open checkout
          </a>
        </div>
      </div>

      <div class="footer">
        This site forwards to the bank gateway and does not store card details.
      </div>
    </div>
  </body>
</html>
