<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Cancelled</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Prince Education</h1>
            <div class="pill">AALA 2026 — Payment cancelled</div>
          </div>
        </div>
      </header>

      <div class="card">
        <h2>Payment was cancelled</h2>
        <p>
          No payment was completed. You can return to checkout and try again.
        </p>
        <div class="actions">
          <a class="btn-primary" href="checkout.html" style="display:inline-block;text-decoration:none;padding:10px 14px;">
            Back to checkout
          </a>
          <a class="btn-secondary" href="index.html" style="display:inline-block;text-decoration:none;padding:10px 14px;">
            Return to Prince Education
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
